<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 스터디 트래커</title>
    <!-- 그래프를 그리기 위한 Chart.js 도구 불러오기 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: '맑은 고딕', sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        h1, h2 { color: #333; }
        .section { background-color: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .timer-display { font-size: 3em; font-weight: bold; text-align: center; margin: 20px 0; color: #0056b3; }
        button { padding: 10px 15px; margin: 2px; cursor: pointer; border: none; border-radius: 5px; background-color: #e0e0e0; }
        button:hover { background-color: #d0d0d0; }
        .active-btn { background-color: #0056b3; color: white; }
        .active-btn:hover { background-color: #004494; }
        #todo-input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        li input[type="checkbox"] { margin-right: 10px; transform: scale(1.5); cursor: pointer; }
        /* 그래프가 너무 커지지 않도록 크기 조절 */
        #chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>
    <h1>📚 스터디 및 목표 달성 트래커</h1>
    
    <!-- 1. 할 일 (To-Do) 영역 -->
    <div class="section">
        <h2>오늘의 할 일</h2>
        <input type="text" id="todo-input" placeholder="할 일을 적고 추가 버튼을 누르세요">
        <button class="active-btn" onclick="addTodo()">추가</button>
        <ul id="todo-list"></ul>
    </div>

    <!-- 2. 타이머 영역 -->
    <div class="section">
        <h2>타이머</h2>
        <div style="text-align: center;">
            <button id="btn-pomodoro" class="active-btn" onclick="setMode('pomodoro')">뽀모도로 (25분)</button>
            <button id="btn-stopwatch" onclick="setMode('stopwatch')">일반 스톱워치</button>
        </div>
        
        <div class="timer-display" id="time-display">25:00</div>
        
        <div style="text-align: center;">
            <button class="active-btn" onclick="startTimer()">▶ 시작</button>
            <button onclick="stopTimer()">⏸ 일시정지</button>
            <button onclick="resetTimer()">🔄 초기화</button>
        </div>
    </div>

    <!-- 3. 주간 그래프 영역 -->
    <div class="section">
        <h2>📊 주간 공부 통계 (단위: 분)</h2>
        <div id="chart-container">
            <!-- 여기에 그래프가 그려집니다 -->
            <canvas id="studyChart"></canvas>
        </div>
    </div>

    <script>
        // === 1. 할 일 기능 ===
        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value;
            if (text.trim() === '') return; 

            const ul = document.getElementById('todo-list');
            const li = document.createElement('li');
            li.innerHTML = `<input type="checkbox" onclick="removeTodo(this)"> ${text}`;
            ul.appendChild(li);
            input.value = ''; 
        }

        function removeTodo(checkbox) {
            const li = checkbox.parentElement;
            li.remove();
        }


        // === 데이터 저장 및 차트 기능 (추가된 부분) ===
        let myChart = null; // 차트를 담을 변수

        // 오늘의 날짜를 'YYYY-MM-DD' 형태로 가져오는 함수
        function getTodayDate() {
            const today = new Date();
            // 한국 시간대 기준 날짜를 정확히 구하기 위한 보정
            const offset = today.getTimezoneOffset() * 60000;
            const dateOffset = new Date(today.getTime() - offset);
            return dateOffset.toISOString().split('T')[0]; 
        }

        // 타이머가 1초 흐를 때마다 저장소에 1초씩 누적하는 함수
        function addStudyTime() {
            const today = getTodayDate();
            // 브라우저 저장소에서 기존 기록 불러오기 (없으면 빈 공간 생성)
            let data = JSON.parse(localStorage.getItem('studyData') || '{}');
            
            // 오늘 날짜에 1초 더하기
            data[today] = (data[today] || 0) + 1; 
            
            // 다시 브라우저 저장소에 저장하기
            localStorage.setItem('studyData', JSON.stringify(data));
        }

        // 주간 그래프를 그리고 업데이트하는 함수
        function updateChart() {
            const ctx = document.getElementById('studyChart').getContext('2d');
            let data = JSON.parse(localStorage.getItem('studyData') || '{}');
            
            const labels = []; // x축 (날짜)
            const chartData = []; // y축 (공부 시간 - 분 단위)
            
            // 최근 7일치 날짜 계산하기
            for (let i = 6; i >= 0; i--) {
                let d = new Date();
                d.setDate(d.getDate() - i);
                const offset = d.getTimezoneOffset() * 60000;
                const dateOffset = new Date(d.getTime() - offset);
                const dateStr = dateOffset.toISOString().split('T')[0];
                
                // 'MM-DD' 형식으로 화면에 표시
                labels.push(dateStr.substring(5)); 
                
                // 초 단위 데이터를 분 단위로 변환 (소수점 1자리까지 표시)
                const secondsStudied = data[dateStr] || 0;
                chartData.push((secondsStudied / 60).toFixed(1)); 
            }

            // 기존에 그려진 그래프가 있다면 지우고 새로 그리기
            if (myChart) {
                myChart.destroy(); 
            }

            // Chart.js를 이용해 막대그래프 그리기
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '공부 시간 (분)',
                        data: chartData,
                        backgroundColor: '#0056b3', // 그래프 막대 색상
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }


        // === 2. 타이머 기능 ===
        let timerInterval = null;
        let seconds = 25 * 60; 
        let mode = 'pomodoro'; 
        let isRunning = false;

        function updateDisplay() {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            document.getElementById('time-display').innerText = `${m}:${s}`;
        }

        function setMode(newMode) {
            stopTimer();
            mode = newMode;
            document.getElementById('btn-pomodoro').className = (mode === 'pomodoro') ? 'active-btn' : '';
            document.getElementById('btn-stopwatch').className = (mode === 'stopwatch') ? 'active-btn' : '';
            seconds = (mode === 'pomodoro') ? 25 * 60 : 0;
            updateDisplay();
        }

        function startTimer() {
            if (isRunning) return; 
            isRunning = true;
            
            timerInterval = setInterval(function() {
                // *** 타이머가 1초 흐를 때마다 공부 시간 저장 ***
                addStudyTime();

                if (mode === 'pomodoro') {
                    if (seconds > 0) {
                        seconds--;
                    } else {
                        stopTimer();
                        alert("뽀모도로 시간이 끝났습니다! 쉬는 시간을 가지세요.");
                    }
                } else {
                    seconds++; 
                }
                updateDisplay();
            }, 1000); 
        }

        function stopTimer() {
            isRunning = false;
            clearInterval(timerInterval); 
            // 정지할 때 그래프 최신화
            updateChart(); 
        }

        function resetTimer() {
            setMode(mode); 
        }

        // 웹사이트가 처음 열릴 때 그래프 한 번 그리기
        updateChart();

    </script>
</body>
</html>
