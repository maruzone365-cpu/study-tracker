<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>나의 스터디 트래커</title>
                <style>
                        /* 화면을 조금 깔끔하게 보이게 하는 디자인(CSS) 입니다 */
                                body { font-family: '맑은 고딕', sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
                                        h1, h2 { color: #333; }
                                                .section { background-color: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
                                                        .timer-display { font-size: 3em; font-weight: bold; text-align: center; margin: 20px 0; color: #0056b3; }
                                                                button { padding: 10px 15px; margin: 2px; cursor: pointer; border: none; border-radius: 5px; background-color: #e0e0e0; }
                                                                        button:hover { background-color: #d0d0d0; }
                                                                                .active-btn { background-color: #0056b3; color: white; }
                                                                                        .active-btn:hover { background-color: #004494; }
                                                                                                #todo-input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
                                                                                                        ul { list-style-type: none; padding: 0; }
                                                                                                                li { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; }
                                                                                                                        li input[type="checkbox"] { margin-right: 10px; transform: scale(1.5); cursor: pointer; }
                                                                                                                            </style>
                                                                                                                            </head>
                                                                                                                            <body>
                                                                                                                                <h1>📚 스터디 및 목표 달성 트래커</h1>
                                                                                                                                    
                                                                                                                                        <!-- 1. 할 일 (To-Do) 영역 -->
                                                                                                                                            <div class="section">
                                                                                                                                                    <h2>오늘의 할 일</h2>
                                                                                                                                                            <input type="text" id="todo-input" placeholder="할 일을 적고 추가 버튼을 누르세요">
                                                                                                                                                                    <button class="active-btn" onclick="addTodo()">추가</button>
                                                                                                                                                                            <ul id="todo-list">
                                                                                                                                                                                        <!-- 추가된 할 일이 여기에 쌓입니다 -->
                                                                                                                                                                                                </ul>
                                                                                                                                                                                                    </div>

                                                                                                                                                                                                        <!-- 2. 타이머 영역 -->
                                                                                                                                                                                                            <div class="section">
                                                                                                                                                                                                                    <h2>타이머</h2>
                                                                                                                                                                                                                            <div style="text-align: center;">
                                                                                                                                                                                                                                        <button id="btn-pomodoro" class="active-btn" onclick="setMode('pomodoro')">뽀모도로 (25분)</button>
                                                                                                                                                                                                                                                    <button id="btn-stopwatch" onclick="setMode('stopwatch')">일반 스톱워치</button>
                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                            <div class="timer-display" id="time-display">25:00</div>
                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                            <div style="text-align: center;">
                                                                                                                                                                                                                                                                                                        <button class="active-btn" onclick="startTimer()">▶ 시작</button>
                                                                                                                                                                                                                                                                                                                    <button onclick="stopTimer()">⏸ 일시정지</button>
                                                                                                                                                                                                                                                                                                                                <button onclick="resetTimer()">🔄 초기화</button>
                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                <!-- 3. 그래프 영역 (자리만 미리 만들어 둠) -->
                                                                                                                                                                                                                                                                                                                                                    <div class="section">
                                                                                                                                                                                                                                                                                                                                                            <h2>📊 주간 공부 통계</h2>
                                                                                                                                                                                                                                                                                                                                                                    <p style="text-align: center; color: #666;">(타이머 기록을 바탕으로 여기에 그래프가 추가될 예정입니다)</p>
                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                            <!-- 자바스크립트 (기능 작동 코드) -->
                                                                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                                                                        // === 1. 할 일 (To-Do) 기능 ===
                                                                                                                                                                                                                                                                                                                                                                                                function addTodo() {
                                                                                                                                                                                                                                                                                                                                                                                                            const input = document.getElementById('todo-input');
                                                                                                                                                                                                                                                                                                                                                                                                                        const text = input.value;
                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                // 빈칸이면 아무것도 안 함
                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (text.trim() === '') return; 

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const ul = document.getElementById('todo-list');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const li = document.createElement('li');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // 체크박스를 누르면 removeTodo 함수가 실행되도록 설정
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        li.innerHTML = `<input type="checkbox" onclick="removeTodo(this)"> ${text}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ul.appendChild(li);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // 입력창 다시 비우기
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        input.value = ''; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function removeTodo(checkbox) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // 체크박스의 부모(li 태그)를 찾아서 화면에서 완전히 지웁니다.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const li = checkbox.parentElement;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            li.remove();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }


                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // === 2. 타이머 기능 ===
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let timerInterval = null;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let seconds = 25 * 60; // 기본 25분
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let mode = 'pomodoro'; // 'pomodoro' 또는 'stopwatch'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let isRunning = false;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function updateDisplay() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // 초를 분과 초로 계산해서 화면에 표시
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const s = String(seconds % 60).padStart(2, '0');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('time-display').innerText = `${m}:${s}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function setMode(newMode) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                stopTimer();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            mode = newMode;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // 버튼 색상 변경 (어떤 모드인지 표시)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('btn-pomodoro').className = (mode === 'pomodoro') ? 'active-btn' : '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('btn-stopwatch').className = (mode === 'stopwatch') ? 'active-btn' : '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // 시간 초기화
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (mode === 'pomodoro') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                seconds = 25 * 60; // 뽀모도로는 25분에서 줄어듦
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            seconds = 0; // 스톱워치는 0초에서 늘어남
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    updateDisplay();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function startTimer() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (isRunning) return; // 이미 실행 중이면 무시
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            isRunning = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    timerInterval = setInterval(function() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (mode === 'pomodoro') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (seconds > 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                seconds--;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            stopTimer();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    alert("뽀모도로 시간이 끝났습니다! 쉬는 시간을 가지세요.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            seconds++; // 스톱워치는 계속 1초씩 증가
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            updateDisplay();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }, 1000); // 1000밀리초(1초)마다 실행
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function stopTimer() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    isRunning = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                clearInterval(timerInterval); // 타이머 멈춤
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function resetTimer() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setMode(mode); // 현재 모드로 다시 세팅하면서 시간 초기화
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
